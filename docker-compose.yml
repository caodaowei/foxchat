version: '3.8'

services:
  backend:
    build: ./backend
    container_name: foxchat-backend
    ports:
      - "7001:7001"
    environment:
      - NODE_ENV=production
      - PORT=7001
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://foxchat:foxchat123@10.2.0.4:7801/foxchat
      - JWT_SECRET=foxchat-production-secret-key-min-32-characters
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:7002
    command: >
      sh -c "npm run db:migrate && npm run db:seed && npm start"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: foxchat-frontend
    ports:
      - "7002:80"
    environment:
      - VITE_API_URL=http://localhost:7001/api
    depends_on:
      - backend
    restart: unless-stopped
