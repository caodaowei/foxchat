name: FoxChat CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foxchat
          POSTGRES_PASSWORD: foxchat123
          POSTGRES_DB: foxchat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Run tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://foxchat:foxchat123@localhost:5432/foxchat_test
      run: npm test
    
    - name: Build
      working-directory: ./backend
      run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to AITest01
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AITEST01_HOST }}
        username: ${{ secrets.AITEST01_USER }}
        key: ${{ secrets.AITEST01_KEY }}
        script: |
          cd ~/src/foxchat
          git pull origin main
          docker-compose down
          docker-compose up -d --build
